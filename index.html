<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghost Chat Pro</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:      #0b1118;
  --chat:    #111b21;
  --sent:    #005c4b;
  --recv:    #1f2c34;
  --acc:     #00a884;
  --acc2:    #00c49a;
  --text:    #e9edef;
  --sub:     #8696a0;
  --rs:      #004438;
  --rr:      #182229;
  --bar:     #202c33;
  --inp:     #2a3942;
  --danger:  #e74c3c;
  --gold:    #f0a500;
}

html, body { width:100%; height:100%; font-family:'Nunito',sans-serif; background:var(--bg); overflow:hidden; }

/* ══ SCREENS ══ */
.screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
.screen.hidden { display:none !important; }
#s-chat { flex-direction:column; align-items:stretch; }

/* ══ LOGIN ══ */
.card {
  background:var(--bar); border:1px solid #2a394260;
  border-radius:22px; padding:38px 28px;
  width:min(340px, 94vw); text-align:center;
  box-shadow:0 24px 64px #00000070;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn {
  from { opacity:0; transform:scale(.82) translateY(24px); }
  to   { opacity:1; transform:scale(1)   translateY(0);    }
}
.card-logo {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,var(--acc),#00796b);
  display:flex; align-items:center; justify-content:center;
  font-size:32px; margin:0 auto 18px;
  box-shadow:0 6px 24px #00a88450;
  animation:float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.card h2 { color:var(--text); font-size:22px; font-weight:800; margin-bottom:6px; }
.card p  { color:var(--sub); font-size:12.5px; margin-bottom:24px; }

.field { position:relative; margin-bottom:13px; }
.field-ico { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }
.field input {
  width:100%; padding:12px 14px 12px 42px;
  background:var(--inp); border:1.5px solid #2a394270;
  border-radius:11px; outline:none;
  color:var(--text); font-family:inherit; font-size:14px;
  transition:border-color .2s, box-shadow .2s;
}
.field input::placeholder { color:var(--sub); }
.field input:focus { border-color:var(--acc); box-shadow:0 0 0 3px #00a88420; }

.join-btn {
  width:100%; padding:13px;
  background:linear-gradient(135deg,var(--acc),#00796b);
  color:#fff; border:none; border-radius:11px;
  font-family:inherit; font-size:15px; font-weight:800;
  cursor:pointer; margin-top:4px;
  box-shadow:0 4px 18px #00a88440;
  transition:transform .15s, box-shadow .15s;
}
.join-btn:active { transform:scale(.97); }
.card-note { margin-top:14px; font-size:11px; color:var(--sub); }
.card-note b { color:var(--acc); }

/* ══ CHAT HEADER ══ */
.c-head {
  background:var(--bar); padding:10px 14px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid #2a394240; flex-shrink:0; z-index:20;
}
.c-av {
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),#00796b);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; color:#fff;
  box-shadow:0 2px 8px #00a88440;
}
.c-info { flex:1; min-width:0; }
.c-name { font-size:15px; color:var(--text); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.c-status { font-size:11px; color:var(--acc); display:flex; align-items:center; gap:5px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--acc); flex-shrink:0; animation:blink 1.6s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.head-btn {
  background:none; border:1.5px solid #2a3942;
  color:var(--sub); border-radius:8px;
  padding:5px 10px; font-family:inherit; font-size:12px;
  cursor:pointer; flex-shrink:0; transition:.2s;
  display:flex; align-items:center; gap:5px;
}
.head-btn:hover { border-color:var(--acc); color:var(--acc); }
.head-btn.danger:hover { border-color:var(--danger); color:var(--danger); }

/* ══ GHOST INFO ══ */
.ghost-bar {
  background:#1a2730; padding:4px 14px;
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:var(--sub); flex-shrink:0;
  border-bottom:1px solid #2a394228;
}
.g-dot { width:6px; height:6px; border-radius:50%; background:var(--acc); animation:blink 1.6s infinite; flex-shrink:0; }

/* ══ MESSAGES ══ */
#messages {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:10px 12px; display:flex; flex-direction:column; gap:3px;
  background:var(--chat);
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02' fill-rule='evenodd'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}
#messages::-webkit-scrollbar { width:3px; }
#messages::-webkit-scrollbar-thumb { background:#2a3942; border-radius:4px; }

.day-sep { text-align:center; margin:8px 0; }
.day-sep span { background:#1f2c34; color:var(--sub); font-size:11px; padding:4px 12px; border-radius:8px; }

/* system message */
.sys-msg { text-align:center; margin:6px 0; }
.sys-msg span { background:#1a2730; color:var(--sub); font-size:11.5px; padding:4px 14px; border-radius:20px; font-style:italic; }

/* ══ MESSAGE WRAPPER ══ */
.mw { display:flex; align-items:flex-end; position:relative; overflow:visible; }
.mw.s { justify-content:flex-end; }
.mw.r { justify-content:flex-start; }

/* swipe icon */
.sw-ico {
  position:absolute; top:50%; transform:translateY(-50%);
  width:28px; height:28px; border-radius:50%;
  background:var(--acc); display:flex; align-items:center; justify-content:center;
  font-size:13px; color:#fff; opacity:0; pointer-events:none; z-index:0;
  box-shadow:0 2px 8px #00a88450;
}
.mw.s .sw-ico { left:2px; }
.mw.r .sw-ico { right:2px; }

/* ══ BUBBLE ══ */
.bubble {
  max-width:78%; position:relative; z-index:1;
  padding:6px 10px 7px; border-radius:10px;
  word-break:break-word; user-select:none;
  will-change:transform;
  animation:msgIn .22s ease both;
}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.mw.s .bubble { background:var(--sent); border-bottom-right-radius:3px; }
.mw.r .bubble { background:var(--recv); border-bottom-left-radius:3px; }

/* quote */
.qblock { border-left:3px solid var(--acc); padding:4px 8px; border-radius:4px; margin-bottom:5px; display:flex; flex-direction:column; gap:2px; }
.mw.s .qblock { background:var(--rs); }
.mw.r .qblock { background:var(--rr); }
.q-name { font-size:11.5px; font-weight:700; color:var(--acc); }
.q-text { font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }

.b-sender { font-size:11.5px; color:var(--acc); font-weight:700; margin-bottom:2px; }
.b-text   { font-size:14px; color:var(--text); line-height:1.45; }
.b-meta   { display:flex; align-items:center; justify-content:flex-end; gap:3px; margin-top:2px; }
.b-time   { font-size:10.5px; color:var(--sub); }
.ticks    { font-size:12px; color:#8696a0; transition:color .3s; }
.ticks.seen { color:#53bdeb; }

/* admin delete btn on message */
.msg-del {
  position:absolute; top:4px; right:6px;
  background:none; border:none; color:#8696a060;
  font-size:13px; cursor:pointer; padding:2px;
  display:none; transition:color .2s;
}
.msg-del:hover { color:var(--danger); }
.bubble:hover .msg-del { display:block; }

/* ══ TYPING ══ */
#typing-bar { font-size:12.5px; color:var(--sub); padding:3px 16px; font-style:italic; min-height:22px; flex-shrink:0; }

/* ══ REPLY BAR ══ */
#reply-bar {
  background:var(--bar); border-top:2px solid var(--acc);
  padding:8px 14px; display:none; align-items:center; gap:10px; flex-shrink:0;
}
.rb-inner { flex:1; border-left:3px solid var(--acc); padding-left:10px; min-width:0; }
.rb-name  { font-size:12px; font-weight:700; color:var(--acc); }
.rb-text  { font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rb-close { background:none; border:none; color:var(--sub); font-size:20px; cursor:pointer; padding:4px; line-height:1; flex-shrink:0; transition:color .2s; }
.rb-close:hover { color:var(--text); }

/* ══ INPUT ══ */
.input-bar { background:var(--bar); padding:8px 10px; display:flex; align-items:flex-end; gap:8px; flex-shrink:0; }
.inp-wrap { flex:1; background:var(--inp); border-radius:22px; padding:8px 14px; display:flex; align-items:center; gap:8px; }
.emoji-btn { background:none; border:none; font-size:21px; cursor:pointer; flex-shrink:0; }
#msg-inp {
  flex:1; background:none; border:none; outline:none;
  font-family:inherit; font-size:14.5px; color:var(--text);
  resize:none; max-height:100px; line-height:1.4;
}
#msg-inp::placeholder { color:var(--sub); }
.send-btn {
  width:46px; height:46px; border-radius:50%;
  background:var(--acc); border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:#fff; cursor:pointer; flex-shrink:0;
  box-shadow:0 2px 10px #00a88440; transition:transform .15s, background .15s;
}
.send-btn:active { transform:scale(.92); }

/* ══ MEMBERS PANEL ══ */
#members-panel {
  position:fixed; top:0; right:-320px; width:300px; height:100%;
  background:var(--bar); border-left:1px solid #2a394260;
  box-shadow:-6px 0 24px #00000050;
  display:flex; flex-direction:column;
  transition:right .3s ease; z-index:100;
}
#members-panel.open { right:0; }
.mp-head {
  background:#1a2730; padding:16px 16px 14px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid #2a394240;
}
.mp-head h3 { color:var(--text); font-size:15px; font-weight:800; }
.mp-close { background:none; border:none; color:var(--sub); font-size:22px; cursor:pointer; line-height:1; }
.mp-close:hover { color:var(--text); }
.mp-list { flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
.mp-list::-webkit-scrollbar { width:3px; }

.member-item {
  background:#1a2730; border-radius:12px; padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  border:1px solid #2a394240;
  animation:msgIn .2s ease both;
}
.m-av {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),#00796b);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; color:#fff;
}
.m-info { flex:1; min-width:0; }
.m-name { font-size:13.5px; color:var(--text); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-role { font-size:11px; }
.m-role.admin { color:var(--gold); }
.m-role.member { color:var(--sub); }
.kick-btn {
  background:none; border:1.5px solid var(--danger);
  color:var(--danger); border-radius:8px;
  padding:5px 10px; font-size:12px; font-family:inherit;
  cursor:pointer; flex-shrink:0; transition:.2s;
  font-weight:700;
}
.kick-btn:hover { background:var(--danger); color:#fff; }
.mp-footer { padding:14px; border-top:1px solid #2a394240; }
.mp-note { font-size:11px; color:var(--sub); text-align:center; }

/* overlay behind panel */
#panel-overlay {
  position:fixed; inset:0; background:#00000050;
  display:none; z-index:90;
}

/* ══ CONTEXT MENU ══ */
#ctx {
  position:fixed; z-index:9999;
  background:#1a2730; border:1px solid #2a394260;
  border-radius:12px; box-shadow:0 6px 24px #00000090;
  padding:4px 0; min-width:150px; display:none;
  animation:ctxIn .15s ease both;
}
@keyframes ctxIn { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
#ctx button {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:11px 16px;
  background:none; border:none;
  color:var(--text); font-family:inherit; font-size:13.5px;
  text-align:left; cursor:pointer; transition:background .15s;
}
#ctx button:hover { background:#2a3942; }
#ctx button.red { color:var(--danger); }

/* ══ TOAST ══ */
#toast {
  position:fixed; bottom:90px; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#1a2730; color:var(--text); font-size:13px;
  padding:8px 20px; border-radius:20px; border:1px solid #2a394260;
  box-shadow:0 4px 12px #00000060;
  opacity:0; pointer-events:none; transition:all .3s; z-index:10000;
  white-space:nowrap;
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* ══ KICKED OVERLAY ══ */
#kicked-overlay {
  position:fixed; inset:0; background:#0b1118f0;
  display:none; align-items:center; justify-content:center;
  z-index:99999; flex-direction:column; gap:16px;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.kicked-card { background:var(--bar); border-radius:20px; padding:36px 28px; text-align:center; width:min(300px,90vw); border:1px solid var(--danger)40; }
.kicked-card .k-ico { font-size:48px; margin-bottom:16px; }
.kicked-card h3 { color:var(--text); font-size:18px; font-weight:800; margin-bottom:8px; }
.kicked-card p  { color:var(--sub); font-size:13px; margin-bottom:20px; }
.kicked-card button {
  background:linear-gradient(135deg,var(--acc),#00796b);
  color:#fff; border:none; border-radius:10px;
  padding:12px 28px; font-family:inherit; font-size:14px;
  font-weight:800; cursor:pointer;
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="screen" id="s-login">
  <div class="card">
    <div class="card-logo">👻</div>
    <h2>Ghost Chat Pro</h2>
    <p>Secure · Auto-delete · Admin Control</p>
    <div class="field">
      <span class="field-ico">👤</span>
      <input id="inp-name" type="text" placeholder="Your Name" maxlength="20" autocomplete="off">
    </div>
    <div class="field">
      <span class="field-ico">🔑</span>
      <input id="inp-room" type="text" placeholder="Room ID (share with friends)" maxlength="30" autocomplete="off">
    </div>
    <button class="join-btn" id="join-btn">JOIN ROOM →</button>
    <p class="card-note">First to join = <b>👑 Admin</b> · Messages vanish in 60s</p>
  </div>
</div>

<!-- ══ CHAT ══ -->
<div class="screen hidden" id="s-chat">

  <!-- Header -->
  <div class="c-head">
    <div class="c-av" id="c-av">R</div>
    <div class="c-info">
      <div class="c-name" id="c-name">Room</div>
      <div class="c-status">
        <span class="dot"></span>
        <span id="c-online">connecting…</span>
      </div>
    </div>
    <button class="head-btn" id="members-btn" title="Members">👥 <span id="member-count">0</span></button>
    <button class="head-btn danger" id="exit-btn">Exit</button>
  </div>

  <!-- Ghost info bar -->
  <div class="ghost-bar">
    <span class="g-dot"></span>
    <span id="admin-label">Messages vanish in 60s</span>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="day-sep"><span>Today</span></div>
  </div>

  <!-- Typing -->
  <div id="typing-bar"></div>

  <!-- Reply bar -->
  <div id="reply-bar">
    <div class="rb-inner">
      <div class="rb-name" id="rb-name"></div>
      <div class="rb-text" id="rb-text"></div>
    </div>
    <button class="rb-close" id="rb-close">✕</button>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="inp-wrap">
      <button class="emoji-btn">😊</button>
      <textarea id="msg-inp" rows="1" placeholder="Message…"></textarea>
    </div>
    <button class="send-btn" id="send-btn">➤</button>
  </div>
</div>

<!-- ══ MEMBERS PANEL ══ -->
<div id="panel-overlay"></div>
<div id="members-panel">
  <div class="mp-head">
    <h3>👥 Room Members</h3>
    <button class="mp-close" id="mp-close">×</button>
  </div>
  <div class="mp-list" id="mp-list"></div>
  <div class="mp-footer">
    <p class="mp-note" id="mp-note">Share Room ID to invite friends</p>
  </div>
</div>

<!-- Context Menu -->
<div id="ctx">
  <button id="ctx-reply">↩️ &nbsp;Reply</button>
  <button id="ctx-copy">📋 &nbsp;Copy</button>
  <button id="ctx-delete" class="red">🗑️ &nbsp;Delete</button>
</div>

<!-- Kicked Overlay -->
<div id="kicked-overlay">
  <div class="kicked-card">
    <div class="k-ico">🚫</div>
    <h3>Removed from Room</h3>
    <p>Admin ne aapko is room se remove kar diya hai.</p>
    <button onclick="location.reload()">Back to Login</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════
   FIREBASE CONFIG
══════════════════════════════════════ */
firebase.initializeApp({
  apiKey:            "APNI_NEW_API_KEY_YAHAN_DAALO",
  authDomain:        "my-chat-77ef9.firebaseapp.com",
  databaseURL:       "https://my-chat-77ef9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "my-chat-77ef9",
  storageBucket:     "my-chat-77ef9.firebasestorage.app",
  messagingSenderId: "201184055478",
  appId:             "1:201184055478:web:98e67e97e0b6c1f80ed617"
});
const DB = firebase.database();

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let ME = '', ROOM = '', roomRef = null;
let amAdmin    = false;
let adminName  = '';
let replyData  = null;
let ctxData    = null;
const rendered = new Set();
const timers   = {};

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function safeKey(s) { return String(s).replace(/[.#$[\]/\s]/g,'_'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function now12() { return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }

let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('on'), 2600);
}

function sysMsg(text) {
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.innerHTML = `<span>${esc(text)}</span>`;
  document.getElementById('messages').appendChild(d);
  scrollBottom();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

/* ══════════════════════════════════════
   JOIN ROOM
══════════════════════════════════════ */
async function doJoin() {
  const name = document.getElementById('inp-name').value.trim();
  const room = document.getElementById('inp-room').value.trim();
  if (!name) { toast('⚠️ Apna naam daalo!'); return; }
  if (!room) { toast('⚠️ Room ID daalo!'); return; }

  ME   = name;
  ROOM = room;
  roomRef = DB.ref('rooms/' + safeKey(ROOM));

  /* ── Set admin: first user who arrives ── */
  const adminRef = roomRef.child('admin');
  const adminSnap = await adminRef.once('value');

  if (!adminSnap.exists()) {
    // Nobody here yet → I am admin
    await adminRef.set(ME);
    amAdmin   = true;
    adminName = ME;
  } else {
    adminName = adminSnap.val();
    amAdmin   = (adminName === ME);
  }

  /* ── Presence ── */
  const myPresRef = roomRef.child('presence/' + safeKey(ME));
  myPresRef.set({ name:ME, ts:Date.now(), kicked:false });
  myPresRef.onDisconnect().remove();
  roomRef.child('typing/'+safeKey(ME)).onDisconnect().remove();

  /* ── Switch UI ── */
  document.getElementById('s-login').classList.add('hidden');
  document.getElementById('s-chat').classList.remove('hidden');
